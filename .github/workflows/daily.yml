name: Tech Digest Daily

on:
  # 每天 UTC 22:37 运行 = 北京时间 6:37（避开整点减少延迟）
  schedule:
    - cron: '22 21 * * *'

  # 手动触发（用于测试）
  workflow_dispatch:
    inputs:
      enable_ai:
        description: '启用 AI 总结'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_dedup:
        description: '启用历史去重（测试时可关闭）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

# 并发控制：防止 GitHub Actions 调度器异常导致的重复运行
# 问题背景：GitHub Actions 的 cron 调度器存在已知的可靠性问题，
# 在高负载时期可能会多次触发同一个 scheduled workflow，导致重复发送邮件
# 解决方案：使用 concurrency 确保同一时间只有一个 workflow 在运行
concurrency:
  group: daily-digest-workflow
  cancel-in-progress: false  # 不取消正在运行的任务，只阻止新的重复任务排队

# 需要写入权限来提交历史记录
permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 🚀 获取资讯并发送邮件
        env:
          # 必需配置
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

          # AI 总结配置
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GITHUB_USERNAME: ${{ secrets.GH_USERNAME }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # 数据源开关 (true/false)
          ENABLE_GITHUB: 'true'
          ENABLE_HACKERNEWS: 'true'
          ENABLE_PRODUCTHUNT: 'true'
          ENABLE_DEVTO: 'true'

          # 数量配置
          GITHUB_LIMIT: '15'
          HACKERNEWS_LIMIT: '10'
          PRODUCTHUNT_LIMIT: '8'
          DEVTO_LIMIT: '10'

          # AI 总结开关
          ENABLE_AI_SUMMARY: ${{ github.event.inputs.enable_ai || 'true' }}

          # 历史去重开关（测试时可关闭）
          ENABLE_HISTORY_DEDUP: ${{ github.event.inputs.enable_dedup || 'true' }}

          # 可选：使用 SMTP 替代 Resend
          # SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          # SMTP_PORT: ${{ secrets.SMTP_PORT }}
          # SMTP_USER: ${{ secrets.SMTP_USER }}
          # SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          cd src
          python main.py

      - name: 💾 提交历史记录
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 检查是否有历史文件需要提交
          if [ -f "data/history.json" ]; then
            git add data/history.json
            git diff --staged --quiet || git commit -m "chore: update dedup history [skip ci]"
            git push || echo "No changes to push"
          fi

      - name: 📊 任务状态
        if: always()
        run: |
          echo "任务完成时间: $(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "北京时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"

